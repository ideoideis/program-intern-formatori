<nav class="rail" aria-label="zilele festivalului"><div class="rail-inner"><div class="rail-days" id="rail"></div><div class="rail-pins" id="railpins"></div></div></nav>

<div class="wrap">
  <div class="trupebar" id="trupebar"></div>

      <button class="vbtn" data-view="lista" aria-pressed="true">listă</button>

      <input class="search" id="q" type="search" placeholder="caută: eveniment, trupă, trainer…" aria-label="caută în program">
      <div class="chiprow" id="catchips"></div>
      <p class="legend-note">click pe una sau mai multe categorii ca să vezi doar acel tip de evenimente · atinge din nou pentru tot programul</p>
    </div>
  </div>
  <main id="days"><noscript>Pagina are nevoie de JavaScript ca să afișeze programul.</noscript></main>
</div>

<button class="fab" id="fab" hidden>acum<small id="fabt"></small></button>

<script>
/* publicul: traineri, mentori, trupe.
   Evenimentele mari fără Art&Play și fără programarea de zi pentru
   copii/comunitate (scena mică, Kaufland). Repetițiile apar DOAR
   pentru trupe (trainerul are nevoie de orele trupei lui), fără
   rândurile @tehnic, fără necesar tehnic/producție.
   Fără 28 iulie și 5 august. */
window.AUD = {
  key:'formatori',
  cats:['tt','ateliere','cmt','mare','cine','parada','alt'],
  skipDays:['ma28','mi5'],
  hideTrupa:false,
  trupePicker:true,
  compact:'trupa',
  transport:true,
  showTech:false,
  showNeeds:false,
  greetings:null, /* aici intră replicile pentru formatori, când le avem */
  sw:'sw.js',
  info:{ contacts:false, legend:false, trupe:true, formatori:false, arteAlaturate:true, artplay:false },
};
</script>
